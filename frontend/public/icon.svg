<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background base rounded card -->
  <rect width="512" height="512" rx="128" fill="#0c0a09"/>
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glowing-grad)" stroke-width="8" opacity="0.15"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glowing-grad)" stroke-width="4" opacity="0.3"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="glowing-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing background V shape shadow -->
  <path d="M140 160 L220 360 C235 395, 277 395, 292 360 L372 160" fill="none" stroke="url(#violet-grad)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.35"/>

  <!-- Core brand V emblem -->
  <path d="M140 160 L220 360 C235 395, 277 395, 292 360 L372 160" fill="none" stroke="url(#violet-grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
